version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

brews:
  - name: gset
    homepage: https://github.com/theenclave-corp/gset
    description: "Dead-simple CLI to configure git settings following best practices"
    repository:
      owner: theenclave-corp
      name: homebrew-tap

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^test:"
